<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasbih Counter — ذكر</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep:    #0b1a12;
    --bg-mid:     #112318;
    --bg-card:    #162d1e;
    --gold:       #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim:   #7a6030;
    --green:      #2a6b45;
    --green-light:#3d9962;
    --text:       #e8dfc8;
    --text-dim:   #8a7f68;
    --white:      #f5f0e8;
  }

  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Amiri', serif;
  }

  /* ── Geometric background ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      repeating-linear-gradient(60deg,  transparent, transparent 34px, rgba(201,168,76,.04) 34px, rgba(201,168,76,.04) 35px),
      repeating-linear-gradient(-60deg, transparent, transparent 34px, rgba(201,168,76,.04) 34px, rgba(201,168,76,.04) 35px),
      repeating-linear-gradient(0deg,   transparent, transparent 34px, rgba(201,168,76,.03) 34px, rgba(201,168,76,.03) 35px);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(42,107,69,.25) 0%, transparent 70%);
    pointer-events: none;
  }

  .app {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 16px;
    gap: 20px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    animation: fadeDown .8s ease both;
  }
  .header-arabic {
    font-family: 'Amiri', serif;
    font-size: 2.4rem;
    color: var(--gold);
    line-height: 1;
    letter-spacing: .05em;
    text-shadow: 0 0 28px rgba(201,168,76,.4);
  }
  .header-latin {
    font-family: 'Cinzel Decorative', serif;
    font-size: .72rem;
    letter-spacing: .22em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── Divider ── */
  .divider {
    width: 220px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    animation: fadeDown .8s .1s ease both;
  }

  /* ── Phrase selector ── */
  .phrase-row {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    animation: fadeDown .8s .2s ease both;
  }
  .phrase-btn {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--text-dim);
    font-family: 'Amiri', serif;
    font-size: .88rem;
    padding: 6px 16px;
    border-radius: 40px;
    cursor: pointer;
    transition: all .2s;
  }
  .phrase-btn:hover  { border-color: var(--gold); color: var(--gold); }
  .phrase-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--bg-deep);
    font-weight: 700;
    box-shadow: 0 0 14px rgba(201,168,76,.35);
  }

  /* ── Main card ── */
  .card {
    background: var(--bg-card);
    border: 1px solid rgba(201,168,76,.18);
    border-radius: 20px;
    padding: 32px 28px 28px;
    width: 100%; max-width: 380px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(201,168,76,.12);
    animation: fadeUp .8s .3s ease both;
  }

  /* Arabic phrase display */
  .phrase-display {
    font-family: 'Amiri', serif;
    font-size: 1.9rem;
    color: var(--gold-light);
    text-align: center;
    line-height: 1.3;
    min-height: 2.5rem;
    text-shadow: 0 0 20px rgba(232,201,122,.3);
    transition: opacity .2s;
  }
  .phrase-meaning {
    font-size: .82rem;
    color: var(--text-dim);
    letter-spacing: .06em;
    margin-top: -12px;
    transition: opacity .2s;
  }

  /* ── Counter ring ── */
  .counter-wrap {
    position: relative;
    width: 180px; height: 180px;
    display: flex; align-items: center; justify-content: center;
  }
  .ring-svg {
    position: absolute; inset: 0;
    transform: rotate(-90deg);
  }
  .ring-track {
    fill: none;
    stroke: rgba(201,168,76,.1);
    stroke-width: 6;
  }
  .ring-fill {
    fill: none;
    stroke: var(--gold);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 502;
    stroke-dashoffset: 502;
    filter: drop-shadow(0 0 6px rgba(201,168,76,.5));
    transition: stroke-dashoffset .35s cubic-bezier(.4,0,.2,1);
  }
  .ring-fill.complete {
    stroke: var(--green-light);
    filter: drop-shadow(0 0 10px rgba(61,153,98,.7));
  }

  .count-num {
    font-family: 'Cinzel Decorative', serif;
    font-size: 3.2rem;
    font-weight: 700;
    color: var(--white);
    text-shadow: 0 0 20px rgba(255,255,255,.2);
    transition: transform .1s;
    line-height: 1;
  }
  .count-num.pulse {
    animation: pulse .15s ease;
  }
  .count-num.complete-glow {
    color: var(--gold-light);
    text-shadow: 0 0 24px rgba(232,201,122,.6);
  }

  /* ── Target info ── */
  .target-row {
    display: flex; gap: 6px; align-items: center;
    font-size: .78rem; color: var(--text-dim); letter-spacing: .08em;
  }
  .target-val { color: var(--gold); font-weight: 700; }
  .sets-badge {
    background: rgba(42,107,69,.3);
    border: 1px solid rgba(61,153,98,.3);
    color: var(--green-light);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: .74rem;
  }

  /* ── Tap button ── */
  .tap-btn {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, var(--green) 0%, #1e5234 100%);
    border: 1px solid rgba(61,153,98,.4);
    border-radius: 14px;
    color: var(--white);
    font-family: 'Cinzel Decorative', serif;
    font-size: 1rem;
    letter-spacing: .12em;
    cursor: pointer;
    transition: all .15s;
    box-shadow: 0 4px 18px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.08);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .tap-btn:hover  { background: linear-gradient(135deg, var(--green-light) 0%, var(--green) 100%); }
  .tap-btn:active { transform: scale(.97); box-shadow: 0 2px 10px rgba(0,0,0,.4); }

  /* ── Controls ── */
  .controls {
    display: flex; gap: 10px; width: 100%;
  }
  .ctrl-btn {
    flex: 1; padding: 10px 8px;
    background: transparent;
    border: 1px solid rgba(201,168,76,.2);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: 'Amiri', serif;
    font-size: .82rem;
    letter-spacing: .06em;
    cursor: pointer;
    transition: all .2s;
  }
  .ctrl-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .ctrl-btn.danger:hover { border-color: #7a3030; color: #e87a7a; }

  /* ── Target picker ── */
  .target-picker {
    display: flex; gap: 8px; align-items: center; width: 100%;
    justify-content: center;
  }
  .target-label { font-size: .76rem; color: var(--text-dim); letter-spacing: .08em; }
  .target-select {
    background: var(--bg-mid);
    border: 1px solid rgba(201,168,76,.2);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'Amiri', serif;
    font-size: .9rem;
    padding: 4px 10px;
    cursor: pointer;
    outline: none;
  }
  .target-select:focus { border-color: var(--gold-dim); }

  /* ── Sessions log ── */
  .log-wrap {
    width: 100%; max-width: 380px;
    animation: fadeUp .8s .45s ease both;
  }
  .log-title {
    font-size: .7rem; letter-spacing: .14em; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 8px; text-align: center;
  }
  .log-list {
    display: flex; flex-direction: column; gap: 6px;
    max-height: 120px; overflow-y: auto;
  }
  .log-item {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--bg-card);
    border: 1px solid rgba(201,168,76,.08);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: .8rem;
    animation: fadeUp .25s ease both;
  }
  .log-phrase { color: var(--gold); font-family: 'Amiri', serif; font-size: .95rem; }
  .log-count  { color: var(--text-dim); }
  .log-time   { color: var(--text-dim); font-size: .72rem; }

  /* ── Complete flash ── */
  .flash {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(circle, rgba(42,107,69,.45) 0%, transparent 70%);
    pointer-events: none; opacity: 0;
  }
  .flash.show { animation: flashAnim .6s ease forwards; }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-14px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  @keyframes flashAnim {
    0%   { opacity:1; }
    100% { opacity:0; }
  }
  .log-list::-webkit-scrollbar { width: 3px; }
  .log-list::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="app">

  <div class="header">
    <div class="header-arabic">سُبْحَانَ اللَّهِ</div>
    <div class="header-latin">Tasbih Counter · ذكر</div>
  </div>

  <div class="divider"></div>

  <!-- Phrase selector -->
  <div class="phrase-row" id="phraseRow"></div>

 <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn"        onclick="undo()">↩ Undo</button>
      <button class="ctrl-btn"        onclick="resetCurrent()">↺ Reset</button>
      <button class="ctrl-btn danger" onclick="clearAll()">✕ Clear All</button>
    </div>
 
 <!-- Target picker -->
    <div class="target-picker">
      <span class="target-label">SET TARGET:</span>
      <select class="target-select" id="targetSelect" onchange="setTarget(this.value)">
        <option value="11">11</option>
        <option value="33" selected>33</option>
        <option value="99">99</option>
        <option value="100">100</option>
        <option value="500">500</option>
        <option value="1000">1000</option>
        <option value="5000">5000</option>
        <option value="100000">100000</option>
      </select>
    </div>

  <!-- Main card -->
  <div class="card" onclick="tap()">

    <div>
      <div class="phrase-display" id="phraseDisplay"></div>
      <div class="phrase-meaning" id="phraseMeaning"></div>
    </div>
   

    <!-- Counter ring -->
    <div class="counter-wrap">
      <svg class="ring-svg" viewBox="0 0 180 180">
        <circle class="ring-track" cx="90" cy="90" r="80"/>
        <circle class="ring-fill"  cx="90" cy="90" r="80" id="ringFill"/>
      </svg>
      <div class="count-num" id="countNum">0</div>
    </div>

    <!-- Target info -->
    <div class="target-row">
      <span>Target:</span>
      <span class="target-val" id="targetVal">33</span>
      <span>·</span>
      <span class="sets-badge" id="setsBadge">0 sets</span>
    </div>

    <!-- Tap button -->
    <button class="tap-btn" id="tapBtn ">TAP THIS CARD TO COUNT</button>

    

    

  </div>

  <!-- Session log -->
  <div class="log-wrap" id="logWrap" style="display:none">
    <div class="log-title">Completed Sets</div>
    <div class="log-list" id="logList"></div>
  </div>

</div>

<script>
const PHRASES = [
  { arabic: 'سُبْحَانَ اللَّهِ',  meaning: 'Glory be to Allah',       short: 'Subhanallah' },
  { arabic: 'الْحَمْدُ لِلَّهِ', meaning: 'All praise be to Allah',    short: 'Alhamdulillah' },
  { arabic: 'اللَّهُ أَكْبَرُ',   meaning: 'Allah is the Greatest',    short: 'Allahu Akbar' },
  { arabic: 'لَا إِلٰهَ إِلَّا اللَّهُ', meaning: 'There is no god but Allah', short: 'La ilaha illallah' },
  { arabic: 'أَسْتَغْفِرُ اللَّهَ', meaning: 'I seek forgiveness from Allah', short: 'Astaghfirullah' },
];

const LS_KEY = 'tasbih_state';

function saveState() {
  const toSave = {
    phraseIdx: state.phraseIdx,
    count:     state.count,
    target:    state.target,
    sets:      state.sets,
    log:       state.log,
  };
  try { localStorage.setItem(LS_KEY, JSON.stringify(toSave)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    state.phraseIdx = saved.phraseIdx ?? 0;
    state.count     = saved.count     ?? 0;
    state.target    = saved.target    ?? 33;
    state.sets      = saved.sets      ?? 0;
    state.log       = saved.log       ?? [];
  } catch(e) {}
}

// ── Haptic helpers ──
function hapticShort() {
  if (navigator.vibrate) navigator.vibrate(10);
}
function hapticBig() {
  if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
}

let state = {
  phraseIdx: 0,
  count: 0,
  target: 33,
  sets: 0,
  log: [],
  history: [],   // for undo
};

// ── Init phrase buttons ──
const phraseRow = document.getElementById('phraseRow');
PHRASES.forEach((p, i) => {
  const btn = document.createElement('button');
  btn.className = 'phrase-btn' + (i === 0 ? ' active' : '');
  btn.textContent = p.short;
  btn.onclick = () => selectPhrase(i);
  phraseRow.appendChild(btn);
});

function selectPhrase(i) {
  state.phraseIdx = i;
  document.querySelectorAll('.phrase-btn').forEach((b,j) => b.classList.toggle('active', j===i));
  document.getElementById('phraseDisplay').textContent = PHRASES[i].arabic;
  document.getElementById('phraseMeaning').textContent = PHRASES[i].meaning;
  render();
  saveState();
}

function setTarget(val) {
  state.target = parseInt(val);
  render();
  saveState();
}

function tap() {
  state.history.push({count: state.count, sets: state.sets});
  state.count++;

  // Haptic: big every 100, short otherwise
  if (state.count % 100 === 0) {
    hapticBig();
  } else {
    hapticShort();
  }

  const num = document.getElementById('countNum');
  num.classList.remove('pulse');
  void num.offsetWidth;
  num.classList.add('pulse');

  if (state.count >= state.target) {
    completSet();
  } else {
    render();
    saveState();
  }
}

function completSet() {
  state.sets++;
  const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  state.log.unshift({
    phrase: PHRASES[state.phraseIdx].arabic,
    short: PHRASES[state.phraseIdx].short,
    count: state.target,
    time
  });
  state.count = 0;

  // Big haptic on set completion
  hapticBig();

  // Flash effect
  const flash = document.getElementById('flash');
  flash.classList.remove('show');
  void flash.offsetWidth;
  flash.classList.add('show');

  render();
  renderLog();
  saveState();
}

function undo() {
  if (state.history.length === 0) return;
  const prev = state.history.pop();
  state.count = prev.count;
  state.sets  = prev.sets;
  render();
  saveState();
}

function resetCurrent() {
  state.history = [];
  state.count = 0;
  render();
  saveState();
}

function clearAll() {
  state.history = [];
  state.count = 0;
  state.sets  = 0;
  state.log   = [];
  render();
  renderLog();
  saveState();
}

function render() {
  const { count, target, sets, phraseIdx } = state;

  document.getElementById('phraseDisplay').textContent = PHRASES[phraseIdx].arabic;
  document.getElementById('phraseMeaning').textContent = PHRASES[phraseIdx].meaning;

  const num = document.getElementById('countNum');
  num.textContent = count;
  num.classList.toggle('complete-glow', count >= target);

  // Ring
  const circumference = 502;
  const pct = Math.min(count / target, 1);
  const offset = circumference - pct * circumference;
  const ring = document.getElementById('ringFill');
  ring.style.strokeDashoffset = offset;
  ring.classList.toggle('complete', pct >= 1);

  document.getElementById('targetVal').textContent  = target;
  document.getElementById('setsBadge').textContent  = sets + (sets === 1 ? ' set' : ' sets');
  document.getElementById('targetSelect').value = target;
}

function renderLog() {
  const list = document.getElementById('logList');
  const wrap = document.getElementById('logWrap');
  list.innerHTML = '';
  if (state.log.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  state.log.forEach(item => {
    const el = document.createElement('div');
    el.className = 'log-item';
    el.innerHTML = `
      <span class="log-phrase">${item.phrase}</span>
      <span class="log-count">×${item.count}</span>
      <span class="log-time">${item.time}</span>`;
    list.appendChild(el);
  });
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); tap(); }
  if (e.code === 'KeyZ' && (e.ctrlKey || e.metaKey)) undo();
});

// Init — load saved state, then render
loadState();
selectPhrase(state.phraseIdx);
renderLog();
</script>
</body>
 </html>
